name: Check Alerts & Send Email

on:
  schedule:
    # Every 15 minutes, Mon-Fri, during market hours (14:30-21:00 UTC = 9:30AM-4PM ET)
    - cron: '*/15 14-20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: pip install -r requirements.txt
      
      # Step 1: Refresh data with latest prices
      - name: Refresh data
        run: python scripts/build_data.py --out-dir data
        env:
          TZ: America/New_York
      
      # Step 2: Check for signals across all 4 layers
      - name: Check alerts
        run: python scripts/check_alerts.py
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      
      # Step 3: Commit updated data + alert results
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "chore: alert check [automated]" && git push)
