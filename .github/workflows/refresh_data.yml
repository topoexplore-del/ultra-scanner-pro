name: Refresh Scanner Data (Daily)

on:
  schedule:
    # Mon-Fri at 21:30 UTC (4:30 PM ET / 4:30 PM Colombia — after market close)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/build_data.py --out-dir data
        env:
          TZ: America/New_York
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "chore: refresh scanner data [automated]" && git push)
